<body>
  <div data-include="nav">
    <nav class="container nav" aria-label="Navegación principal">
      <a class="logo" href="index.html" data-nav="index">Sergio Delgado</a>
      <ul class="menu">
        <li><a href="about.html" data-nav="about">Sobre mí</a></li>

        <li><a href="contact.html" data-nav="contact">Contacto</a></li>
      </ul>
    </nav>

  <main id="main" class="container">
    <h1>Contacto</h1>
    <p class="muted">
      Si quieres colaborar en proyectos de QA Automation, transformación digital, análisis de datos
      o diseño de sistemas culturales, puedes contactarme a través del formulario o en mis redes
      profesionales.
    </p>

    <form class="card form" id="contact-form" action="https://formspree.io/f/mzzjzlyy" method="POST" data-formspree>
      <label>Nombre
        <input id="name" type="text" name="name" required>
      </label>
      <label>Email
        <input id="email" type="email" name="email" required>
      </label>
      <label>Mensaje
        <textarea id="message" name="message" rows="6" required></textarea>
      </label>
      <button class="btn btn-primary" type="submit">Enviar</button>
      <div class="form-status" role="status" aria-live="polite"></div>
    </form>
  </main>

  <div data-include="footer">
    <footer class="container footer">
      <p class="muted">© <span id="year"></span> Sergio Delgado</p>
    </footer>
  </div>
  <script src="js/script.js"></script>
